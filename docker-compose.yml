services:
  postgres:
    image: postgres:16-alpine
    container_name: felix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: felix
      POSTGRES_PASSWORD: felix
      POSTGRES_DB: felix_boilerplate
    ports:
      - "5433:5432"
    volumes:
      - felix_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U felix -d felix_boilerplate"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  felix_postgres_data:
